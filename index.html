<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash Ruslan - Кланы</title>
    <style>
        /* Основные стили игры */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .game-container {
            width: 100%;
            max-width: 800px;
            background: #161623;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #0f3460;
            padding-bottom: 10px;
        }
        .btn {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
            margin: 5px;
        }
        .btn:hover { background: #ff6b81; }
        .btn-secondary { background: #0f3460; }
        .btn-secondary:hover { background: #1f4068; }
        .btn-danger { background: #950101; }
        .btn-danger:hover { background: #3f0000; }

        /* Модальные окна */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 999;
        }
        .modal-content {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; max-width: 700px;
            height: 80vh;
            background: #1a1a2e;
            border: 2px solid #0f3460;
            border-radius: 10px;
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
        }
        .close-modal {
            float: right;
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }

        /* Интерфейс Клана */
        .clan-grid {
            display: flex;
            gap: 15px;
            height: calc(100% - 120px);
            margin-top: 15px;
        }
        .clan-panel {
            border: 1px solid #0f3460;
            background: #161623;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        .chat-box { flex: 2; }
        .members-box { flex: 1.2; overflow-y: auto; }
        
        .chat-messages {
            flex: 1;
            background: #10101e;
            border: 1px solid #0f3460;
            border-radius: 6px;
            padding: 10px;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        .chat-input-row { display: flex; gap: 5px; }
        .chat-input-row input {
            flex: 1;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            color: #fff;
            padding: 8px;
            border-radius: 4px;
        }

        .member-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #0f3460;
            font-size: 14px;
        }
        .mgr-btn {
            font-size: 11px;
            padding: 2px 5px;
            margin-left: 3px;
        }
        .invite-bar {
            background: #0f3460;
            padding: 10px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .invite-bar input {
            background: #161623;
            border: 1px solid #e94560;
            color: #fff;
            padding: 5px;
            width: 60%;
        }
    </style>

    <!-- СДК Firebase (Замени своими конфигами, если нужно) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <h2>Clash Ruslan</h2>
            <p>Добро пожаловать в игру!</p>
            <div id="userInfo">Загрузка профиля...</div>
        </div>

        <!-- Кнопки управления в интерфейсе -->
        <div style="text-align: center;">
            <button class="btn" onclick="alert('Поиск матча...')">В бой!</button>
            <button class="btn btn-secondary" id="clanMenuBtn" onclick="openClanSystem()">Мой Клан</button>
        </div>
    </div>

    <!-- Модальные окна -->
    <div id="modalOverlay" class="modal-overlay" onclick="closeClanModal()"></div>

    <!-- Окно создания / вступления в клан (если игрок без клана) -->
    <div id="noClanModal" class="modal-content">
        <button class="close-modal" onclick="closeClanModal()">✕</button>
        <h3>У вас еще нет клана в Clash Ruslan</h3>
        <p>Создайте свой собственный клан или введите ID для вступления.</p>
        
        <div style="margin-top: 20px; border-bottom: 1px solid #0f3460; padding-bottom: 20px;">
            <h4>Создать клан</h4>
            <input type="text" id="newClanName" placeholder="Название клана" style="padding: 8px; margin-right: 5px;">
            <input type="text" id="newClanTag" placeholder="ТЕГ (3-4 символа)" maxlength="4" style="padding: 8px; width: 80px; margin-right: 5px;">
            <button class="btn" onclick="createNewClan()">Создать</button>
        </div>

        <div style="margin-top: 20px;">
            <h4>Вступить по ID клана</h4>
            <input type="text" id="joinClanId" placeholder="Введите ID клана" style="padding: 8px; margin-right: 5px; width: 250px;">
            <button class="btn btn-secondary" onclick="joinClanById()">Вступить</button>
        </div>
    </div>

    <!-- Основное Окно Клана -->
    <div id="clanMainModal" class="modal-content">
        <button class="close-modal" onclick="closeClanModal()">✕</button>
        <h3 style="margin-top: 0;">Клан: <span id="uiClanName">...</span> [<span id="uiClanTag">...</span>]</h3>
        
        <!-- Панель приглашения друзей -->
        <div class="invite-bar">
            <button class="btn btn-secondary" style="margin:0; padding: 5px 10px; font-size:14px;" onclick="generateClanInvite()">Пригласить друга</button>
            <input type="text" id="uiInviteInput" readonly style="display:none;" onclick="this.select()">
        </div>

        <div class="clan-grid">
            <!-- Клан Чат -->
            <div class="clan-panel chat-box">
                <h4>Чат Клана</h4>
                <div class="chat-messages" id="uiChatMessages"></div>
                <div class="chat-input-row">
                    <input type="text" id="uiChatInput" placeholder="Напишите сообщение...">
                    <button class="btn style-btn" style="margin:0; padding: 8px 15px;" onclick="sendClanMessage()">Отправить</button>
                </div>
            </div>

            <!-- Список участников с управлением -->
            <div class="clan-panel members-box">
                <h4>Участники</h4>
                <div id="uiMembersList"></div>
            </div>
        </div>
    </div>

    <script>
        // --- КОНФИГУРАЦИЯ FIREBASE ---
        const firebaseConfig = {
            apiKey: "ТВОЙ_API_KEY",
            authDomain: "ТВОЙ_AUTH_DOMAIN",
            projectId: "ТВОЙ_PROJECT_ID",
            storageBucket: "ТВОЙ_STORAGE_BUCKET",
            messagingSenderId: "ТВОЙ_SENDER_ID",
            appId: "ТВОЙ_APP_ID"
        };
        
        // Инициализация (проверка, чтобы не инициализировать дважды)
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // Текущий авторизованный юзер (эмуляция сессии сессии Clash Ruslan)
        let playerSession = {
            uid: "player_ruslik_1",
            name: "Ruslik",
            clanId: "" // Загрузится из БД
        };

        let currentClanData = null;
        let unsubscribeChat = null;
        let unsubscribeMembers = null;

        // Запуск при загрузке
        window.onload = function() {
            loadPlayerProfile();
        };

        // Загрузка профиля игрока из Firestore
        function loadPlayerProfile() {
            document.getElementById("userInfo").innerText = `Игрок: ${playerSession.name}`;
            
            db.collection("users").doc(playerSession.uid).get().then((doc) => {
                if (doc.exists) {
                    playerSession.clanId = doc.data().clanId || "";
                } else {
                    // Если игрока нет, создадим запись
                    db.collection("users").doc(playerSession.uid).set({
                        name: playerSession.name,
                        clanId: ""
                    });
                }
            }).catch(err => console.log("Ошибка загрузки профиля:", err));
        }

        // Кнопка "Мой Клан"
        function openClanSystem() {
            document.getElementById("modalOverlay").style.display = "block";
            
            if (!playerSession.clanId) {
                // Если нет клана, открываем окно создания/вступления
                document.getElementById("noClanModal").style.display = "block";
            } else {
                // Если есть, открываем панель клана и запускаем слушатели
                document.getElementById("clanMainModal").style.display = "block";
                listenToClanData(playerSession.clanId);
            }
        }

        function closeClanModal() {
            document.getElementById("modalOverlay").style.display = "none";
            document.getElementById("noClanModal").style.display = "none";
            document.getElementById("clanMainModal").style.display = "none";
            document.getElementById("uiInviteInput").style.display = "none";
            
            // Отписываемся от обновлений базы данных при закрытии окна
            if (unsubscribeChat) unsubscribeChat();
            if (unsubscribeMembers) unsubscribeMembers();
        }

        // Создание нового клана
        function createNewClan() {
            const name = document.getElementById("newClanName").value.trim();
            const tag = document.getElementById("newClanTag").value.trim().toUpperCase();

            if (!name || tag.length < 3) {
                alert("Введите корректное имя и тег клана (минимум 3 символа)!");
                return;
            }

            const clanRef = db.collection("clans").doc();
            const newClan = {
                id: clanRef.id,
                name: name,
                tag: tag,
                ownerId: playerSession.uid,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            clanRef.set(newClan).then(() => {
                // Добавляем создателя в подколлекцию участников
                return clanRef.collection("members").doc(playerSession.uid).set({
                    id: playerSession.uid,
                    name: playerSession.name,
                    role: "owner",
                    muted: false
                });
            }).then(() => {
                // Обновляем clanId у самого игрока
                return db.collection("users").doc(playerSession.uid).update({ clanId: clanRef.id });
            }).then(() => {
                playerSession.clanId = clanRef.id;
                document.getElementById("noClanModal").style.display = "none";
                document.getElementById("clanMainModal").style.display = "block";
                listenToClanData(clanRef.id);
            }).catch(err => alert("Ошибка создания клана: " + err));
        }

        // Вступление в клан по ID
        function joinClanById() {
            const clanId = document.getElementById("joinClanId").value.trim();
            if (!clanId) return;

            db.collection("clans").doc(clanId).get().then((doc) => {
                if (!doc.exists) {
                    alert("Клан с таким ID не найден!");
                    return;
                }

                // Добавляем игрока в клан
                db.collection("clans").doc(clanId).collection("members").doc(playerSession.uid).set({
                    id: playerSession.uid,
                    name: playerSession.name,
                    role: "member",
                    muted: false
                }).then(() => {
                    return db.collection("users").doc(playerSession.uid).update({ clanId: clanId });
                }).then(() => {
                    playerSession.clanId = clanId;
                    document.getElementById("noClanModal").style.display = "none";
                    document.getElementById("clanMainModal").style.display = "block";
                    listenToClanData(clanId);
                });
            }).catch(err => alert("Ошибка вступления: " + err));
        }

        // Слушатели Firestore для реалтайм обновления чата и участников
        function listenToClanData(clanId) {
            // 1. Получаем базовые инфо клана
            db.collection("clans").doc(clanId).get().then(doc => {
                if(doc.exists) {
                    currentClanData = doc.data();
                    document.getElementById("uiClanName").innerText = currentClanData.name;
                    document.getElementById("uiClanTag").innerText = currentClanData.tag;
                }
            });

            // 2. Слушаем Клан Чат (сортировка по времени)
            unsubscribeChat = db.collection("clans").doc(clanId).collection("chat")
                .orderBy("timestamp", "asc")
                .onSnapshot(snapshot => {
                    const chatBox = document.getElementById("uiChatMessages");
                    chatBox.innerHTML = "";
                    snapshot.forEach(doc => {
                        const msg = doc.data();
                        const msgEl = document.createElement("div");
                        msgEl.style.padding = "3px 0";
                        msgEl.innerHTML = `[${currentClanData?.tag || 'КЛАН'}] <b>${msg.senderName}:</b> ${msg.text}`;
                        chatBox.appendChild(msgEl);
                    });
                    chatBox.scrollTop = chatBox.scrollHeight;
                });

            // 3. Слушаем Список Участников
            unsubscribeMembers = db.collection("clans").doc(clanId).collection("members")
                .onSnapshot(snapshot => {
                    const listContainer = document.getElementById("uiMembersList");
                    listContainer.innerHTML = "";
                    
                    let membersArray = [];
                    snapshot.forEach(doc => { membersArray.push(doc.data()); });

                    // Ищем роль текущего игрока в этом клане
                    const myInfo = membersArray.find(m => m.id === playerSession.uid);
                    const isIAmOwner = myInfo?.role === "owner";

                    membersArray.forEach(member => {
                        const item = document.createElement("div");
                        item.className = "member-item";
                        
                        let infoText = `<b>${member.name}</b> (${member.role})`;
                        if(member.muted) infoText += ` <span style="color:#e94560;">[MUTE]</span>`;
                        
                        let btnsHtml = `<div>`;
                        // Показываем кнопки модерации только владельцу клана и скрываем на самом себе
                        if (isIAmOwner && member.id !== playerSession.uid) {
                            const muteLabel = member.muted ? "Анмут" : "Мут";
                            btnsHtml += `<button class="btn btn-secondary mgr-btn" onclick="toggleMute('${member.id}', ${member.muted})">${muteLabel}</button>`;
                            btnsHtml += `<button class="btn btn-danger mgr-btn" onclick="kickPlayer('${member.id}')">Кик</button>`;
                        }
                        btnsHtml += `</div>`;

                        item.innerHTML = `<span>${infoText}</span> ${btnsHtml}`;
                        listContainer.appendChild(item);
                    });
                });
        }

        // Отправка сообщений в клан-чат
        function sendClanMessage() {
            const input = document.getElementById("uiChatInput");
            const text = input.value.trim();
            if (!text || !playerSession.clanId) return;

            // Проверка на мут перед отправкой
            db.collection("clans").doc(playerSession.clanId).collection("members").doc(playerSession.uid).get().then(doc => {
                if (doc.exists && doc.data().muted) {
                    alert("Вы не можете писать в чат клана. У вас активен мут!");
                    input.value = "";
                    return;
                }

                // Если всё ок — отправляем
                db.collection("clans").doc(playerSession.clanId).collection("chat").add({
                    senderName: playerSession.name,
                    text: text,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                }).then(() => { input.value = ""; });
            });
        }

        // Переключение мута (Владельцем)
        function toggleMute(userId, currentMuteStatus) {
            db.collection("clans").doc(playerSession.clanId).collection("members").doc(userId).update({
                muted: !currentMuteStatus
            });
        }

        // Исключение (Кик) игрока из клана
        function kickPlayer(userId) {
            if (confirm("Вы уверены, что хотите исключить этого игрока из клана?")) {
                // 1. Удаляем игрока из списка участников клана
                db.collection("clans").doc(playerSession.clanId).collection("members").doc(userId).delete().then(() => {
                    // 2. Сбрасываем clanId в профиле самого удаленного юзера
                    return db.collection("users").doc(userId).update({ clanId: "" });
                }).catch(err => console.log("Ошибка при исключении:", err));
            }
        }

        // Генерация реферального инвайт-кода/ссылки
        function generateClanInvite() {
            const input = document.getElementById("uiInviteInput");
            // Генерируем ссылку для вступления. Игрок сможет скопировать ID или зайти по ссылке в Telegram Mini App
            input.value = playerSession.clanId; 
            input.style.display = "inline-block";
            input.select();
            alert("ID клана скопирован! Передайте его другу, чтобы он вставил его в поле 'Вступить по ID'");
        }

        // Отправка сообщения по кнопке Enter
        document.getElementById("uiChatInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendClanMessage();
        });
    </script>
</body>
</html>
